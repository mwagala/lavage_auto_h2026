name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    name: Python quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            dependences.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Static analysis
        run: python -m ruff check .

      - name: Compile Python modules
        run: python -m compileall app.py backend bd frontend scripts

      - name: Unit tests
        run: python -m pytest

  docker-smoke:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: python-quality
    env:
      APP_PORT: 5050
      COMPOSE_PROJECT_NAME: lavageautoci${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose config --quiet

      - name: Build images
        run: docker compose build

      - name: Check production server command
        run: docker compose run --rm --no-deps web sh -c "gunicorn --check-config app:app"

      - name: Start stack
        run: docker compose up -d

      - name: Wait for readiness
        run: |
          for attempt in {1..30}; do
            if curl -fsS "http://127.0.0.1:${APP_PORT}/health/readiness"; then
              exit 0
            fi
            docker compose ps
            sleep 5
          done

          docker compose logs --no-color
          exit 1

      - name: Show service status
        if: always()
        run: docker compose ps

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down -v --remove-orphans
